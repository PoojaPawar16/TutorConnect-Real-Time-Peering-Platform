<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Groups | TutorConnect Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      * {
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        display: flex;
        background: #f4f6fb;
      }

      .sidebar {
        width: 240px;
        background: #111827;
        color: #fff;
        min-height: 100vh;
        padding: 20px;
      }

      .sidebar a {
        display: block;
        padding: 10px;
        color: #d1d5db;
        text-decoration: none;
        border-radius: 6px;
        margin-bottom: 6px;
        cursor: pointer;
      }

      .sidebar a:hover,
      .sidebar a.active {
        background: #1f2937;
        color: #fff;
      }

      .main {
        flex: 1;
        padding: 30px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .btn {
        padding: 6px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }

      .btn.primary {
        background: #2563eb;
        color: #fff;
      }
      .btn.secondary {
        background: #e5e7eb;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 25px;
      }

      .card {
        background: #fff;
        padding: 16px;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      }

      .members div {
        background: #f1f5f9;
        padding: 6px;
        border-radius: 6px;
        margin-top: 4px;
        font-size: 13px;
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        display: none;
        justify-content: center;
        align-items: center;
      }

      .modal-box {
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        width: 360px;
      }

      .modal-box input,
      .modal-box textarea,
      .modal-box select {
        width: 100%;
        padding: 8px;
        margin-bottom: 12px;
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>TutorConnect</h2>
      <a href="admin_dashboard.html">Dashboard</a>
      <a class="active">Groups</a>
      <a href="admin_tutors.html">Tutors</a>
      <a href="admin_learners.html">Learners</a>
      <a href="admin_notifications.html">Notifications</a>
      <a onclick="logout()">Logout</a>
    </div>

    <div class="main">
      <div class="header">
        <h1>Groups</h1>
        <button class="btn primary" onclick="openCreateGroup()">
          + Create Group
        </button>
      </div>

      <div class="grid" id="groupGrid"></div>
    </div>

    <!-- CREATE GROUP MODAL -->
    <div class="modal" id="groupModal">
      <div class="modal-box">
        <h3>Create Group</h3>
        <input id="groupName" placeholder="Group Name" />
        <input id="groupSubject" placeholder="Subject" />
        <textarea id="groupDescription" placeholder="Description"></textarea>

        <div class="modal-actions">
          <button class="btn secondary" onclick="closeGroup()">Cancel</button>
          <button class="btn primary" onclick="createGroup()">Create</button>
        </div>
      </div>
    </div>

    <!-- ADD MEMBER MODAL -->
    <div class="modal" id="memberModal">
      <div class="modal-box">
        <h3>Add Member</h3>
        <select id="memberSelect"></select>

        <div class="modal-actions">
          <button class="btn secondary" onclick="closeMember()">Cancel</button>
          <button class="btn primary" onclick="addMember()">Add</button>
        </div>
      </div>
    </div>

    <script>
      const groupGrid = document.getElementById("groupGrid");
      const memberSelect = document.getElementById("memberSelect");
      let activeGroupId = null;

      /* ================= LOAD GROUPS ================= */
      async function loadGroups() {
        groupGrid.innerHTML = "Loading...";

        try {
          const res = await fetch("/api/admin/groups");
          const groups = await res.json();

          groupGrid.innerHTML = "";

          if (!groups.length) {
            groupGrid.innerHTML = "<p>No groups created yet.</p>";
            return;
          }

          groups.forEach((g) => {
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
        <h3>${g.group_name}</h3>
        <p><b>Subject:</b> ${g.subject}</p>
        <p><b>Description:</b> ${g.description || "No description"}</p>

        <button class="btn secondary" onclick="openMemberModal(${g.group_id})">+ Add Member</button>
        <button class="btn secondary" onclick="deleteGroup(${g.group_id})">Delete</button>

        <div class="members">
          <b>Tutors:</b>
          ${
            g.tutors?.length
              ? g.tutors
                  .map(
                    (t) => `
                <div>
                  ${t.name}
                  <button style="float:right;" onclick="removeTutor(${g.group_id}, ${t.id})">✖</button>
                </div>
              `,
                  )
                  .join("")
              : "<div><i>No tutors</i></div>"
          }

          <b style="margin-top:10px;display:block;">Learners:</b>
          ${
            g.learners?.length
              ? g.learners
                  .map(
                    (l) => `
                <div>
                  ${l.name}
                  <button style="float:right;" onclick="removeLearner(${g.group_id}, ${l.id})">✖</button>
                </div>
              `,
                  )
                  .join("")
              : "<div><i>No learners</i></div>"
          }
        </div>
      `;

            groupGrid.appendChild(card);
          });
        } catch (err) {
          console.error(err);
          groupGrid.innerHTML =
            "<p style='color:red;'>Failed to load groups</p>";
        }
      }

      /* ================= CREATE GROUP ================= */
      async function createGroup() {
        const name = groupName.value.trim();
        const subject = groupSubject.value.trim();
        const description = groupDescription.value.trim();

        if (!name || !subject) {
          alert("Fill required fields");
          return;
        }

        await fetch("/api/admin/groups", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ group_name: name, subject, description }),
        });

        closeGroup();
        groupName.value = "";
        groupSubject.value = "";
        groupDescription.value = "";
        loadGroups();
      }

      /* ================= DELETE GROUP ================= */
      async function deleteGroup(id) {
        if (!confirm("Delete this group?")) return;

        await fetch(`/api/admin/groups/${id}`, { method: "DELETE" });
        loadGroups();
      }

      /* ================= MEMBER MODAL ================= */
      async function openMemberModal(groupId) {
        activeGroupId = groupId;
        memberSelect.innerHTML = "<option value=''>Select Member</option>";

        const tutors = await fetch("/api/tutors").then((r) => r.json());
        const users = await fetch("/api/users").then((r) => r.json());

        memberSelect.innerHTML += "<optgroup label='Tutors'>";
        tutors.forEach((t) => {
          memberSelect.innerHTML += `<option value="tutor-${t.tutor_id}">${t.name}</option>`;
        });
        memberSelect.innerHTML += "</optgroup>";

        memberSelect.innerHTML += "<optgroup label='Learners'>";
        users
          .filter((u) => u.role === "learner")
          .forEach((l) => {
            memberSelect.innerHTML += `<option value="learner-${l.id}">${l.name}</option>`;
          });
        memberSelect.innerHTML += "</optgroup>";

        memberModal.style.display = "flex";
      }

      async function addMember() {
        const value = memberSelect.value;
        if (!value) return alert("Select member");

        const [type, id] = value.split("-");

        if (type === "tutor") {
          await fetch(`/api/admin/groups/${activeGroupId}/add-tutor`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ tutor_id: id }),
          });
        } else {
          await fetch(`/api/admin/groups/${activeGroupId}/add-learner`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ learner_id: id }),
          });
        }

        closeMember();
        loadGroups();
      }

      async function removeTutor(groupId, tutorId) {
        await fetch(`/api/admin/groups/${groupId}/remove-tutor/${tutorId}`, {
          method: "DELETE",
        });
        loadGroups();
      }

      async function removeLearner(groupId, learnerId) {
        await fetch(
          `/api/admin/groups/${groupId}/remove-learner/${learnerId}`,
          { method: "DELETE" },
        );
        loadGroups();
      }

      /* ================= LOGOUT ================= */
      async function logout() {
        await fetch("/api/logout", { method: "POST" });
        window.location.href = "/login.html";
      }

      function openCreateGroup() {
        groupModal.style.display = "flex";
      }
      function closeGroup() {
        groupModal.style.display = "none";
      }
      function closeMember() {
        memberModal.style.display = "none";
      }

      loadGroups();
    </script>
  </body>
</html>
