<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tutor Groups | TutorConnect</title>

    <style>
      body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: #f4f7fb;
        display: flex;
      }

      /* Sidebar */
      .sidebar {
        width: 250px;
        background: #243447;
        height: 100vh;
        color: white;
        position: fixed;
        padding-top: 20px;
      }

      .sidebar h2 {
        text-align: center;
        color: #00b894;
        margin-bottom: 30px;
      }

      .sidebar a {
        display: block;
        padding: 12px 20px;
        text-decoration: none;
        color: white;
        border-left: 4px solid transparent;
        transition: 0.3s;
      }

      .sidebar a:hover,
      .sidebar a.active {
        background: #00b894;
        border-left: 4px solid white;
      }

      /* Main Content */
      .main-content {
        margin-left: 250px;
        padding: 30px;
        width: 100%;
      }

      h1 {
        color: #2c3e50;
        margin-bottom: 20px;
      }

      /* Group Cards */
      .group-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
      }

      .group-card {
        background: white;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        transition: 0.3s;
      }

      .group-card:hover {
        transform: translateY(-5px);
      }

      .group-card h3 {
        margin: 0;
        color: #243447;
      }

      .group-card p {
        margin: 8px 0;
        font-size: 14px;
        color: #555;
      }

      .group-card button {
        margin-top: 10px;
        padding: 8px 15px;
        border: none;
        border-radius: 6px;
        background: #00b894;
        color: white;
        cursor: pointer;
        transition: 0.3s;
      }

      .group-card button:hover {
        background: #01966d;
      }

      .empty-message {
        background: white;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        color: #777;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>TutorConnect</h2>
      <a href="tutor_dashboard.html">Dashboard</a>
      <a href="tutor_group.html" class="active">Groups</a>
      <a href="completed_sessions.html">Complete Session</a>
      <a href="tutor_sessions.html">Sessions</a>
      <a href="tutor_progress.html">Progress</a>
      <a href="tutor_doubt_requests.html">Doubt Request</a>
      <a href="tutor_logout.html">Logout</a>
    </div>

    <div class="main-content">
      <h1>My Groups</h1>

      <div class="group-container" id="groupsContainer"></div>
    </div>

    <script>
      async function loadGroups() {
        try {
          const res = await fetch("/api/tutor/groups");
          const groups = await res.json();

          const container = document.getElementById("groupsContainer");
          container.innerHTML = "";

          if (!groups.length) {
            container.innerHTML = `
        <div class="empty-message">
          No groups assigned yet.
        </div>
      `;
            return;
          }

          groups.forEach((group) => {
            container.innerHTML += `
        <div class="group-card">
          <h3>${group.group_name}</h3>
          <p><strong>Subject:</strong> ${group.subject}</p>
          <p>${group.description || "No description provided."}</p>
          <button onclick="manageSessions(${group.group_id})">
            Manage Sessions
          </button>
        </div>
      `;
          });
        } catch (err) {
          console.error("Error loading groups:", err);
        }
      }

      function manageSessions(groupId) {
        window.location.href = `tutor_sessions.html?group_id=${groupId}`;
      }

      loadGroups();
    </script>
  </body>
</html>
