<!doctype html>
<html>
  <head>
    <title>Request Doubt Session | TutorConnect</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: #f4f6fb;
        display: flex;
      }

      .sidebar {
        width: 230px;
        background: #0f3057;
        height: 100vh;
        color: white;
        padding-top: 20px;
        position: fixed;
      }

      .sidebar h2 {
        text-align: center;
        margin-bottom: 30px;
      }

      .sidebar a {
        display: block;
        padding: 12px 20px;
        text-decoration: none;
        color: white;
        transition: 0.3s;
      }

      .sidebar a:hover,
      .sidebar a.active {
        background: #1f5fa6;
        border-radius: 6px;
      }

      .main {
        margin-left: 230px;
        padding: 40px;
        width: 100%;
      }

      .card {
        max-width: 600px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
      }

      h1 {
        text-align: center;
        color: #2563eb;
      }

      label {
        display: block;
        margin-top: 15px;
        font-weight: 500;
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 8px;
        border: 1px solid #ccc;
      }

      button {
        margin-top: 20px;
        width: 100%;
        padding: 12px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
      }

      button:hover {
        background: #1e4bb8;
      }

      .success {
        color: green;
        margin-top: 10px;
        text-align: center;
      }

      .error {
        color: red;
        margin-top: 10px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>TutorConnect</h2>
      <a href="courses.html">Find Tutors</a>
      <a href="learner_group.html">My Groups</a>
      <a href="learner_sessions.html">Sessions</a>
      <a href="learner_doubt_request.html" class="active">Request Doubt</a>
      <a href="learner_profile.html">Profile</a>
      <a href="learner_logout.html">Logout</a>
    </div>

    <div class="main">
      <div class="card">
        <h1>Request Private Doubt Session</h1>

        <form id="doubtForm">
          <label>Select Tutor</label>
          <select id="tutorSelect" required>
            <option value="">Loading tutors...</option>
          </select>

          <label>Subject</label>
          <input type="text" id="subject" required />

          <label>Doubt Message</label>
          <textarea id="message" rows="4" required></textarea>

          <label>Preferred Date & Time</label>
          <input type="datetime-local" id="preferred_time" required />

          <button type="submit">Send Request</button>

          <div id="responseMsg"></div>
        </form>
      </div>
    </div>

    <script>
      // Load approved tutors
      async function loadTutors() {
        try {
          const res = await fetch("/api/tutors", { credentials: "include" });
          const tutors = await res.json();

          const select = document.getElementById("tutorSelect");
          select.innerHTML = '<option value="">Select Tutor</option>';

          tutors.forEach((tutor) => {
            const option = document.createElement("option");
            option.value = tutor.tutor_id;
            option.textContent = tutor.name + " (" + tutor.subjects + ")";
            select.appendChild(option);
          });
        } catch (error) {
          document.getElementById("tutorSelect").innerHTML =
            '<option value="">Failed to load tutors</option>';
        }
      }

      loadTutors();

      // Submit doubt request
      document
        .getElementById("doubtForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const tutor_id = document.getElementById("tutorSelect").value;
          const subject = document.getElementById("subject").value;
          const message = document.getElementById("message").value;
          const preferred_time =
            document.getElementById("preferred_time").value;

          try {
            const response = await fetch("/api/learner/doubt-request", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include", // 🔥 VERY IMPORTANT
              body: JSON.stringify({
                tutor_id,
                subject,
                message,
                preferred_time,
              }),
            });

            const result = await response.json();

            if (response.ok) {
              alert("Request sent successfully!");
              document.getElementById("doubtForm").reset();
            } else {
              alert(result.error || "Request failed");
            }
          } catch (error) {
            console.error("Error:", error);
          }
        });
    </script>
  </body>
</html>
