<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tutor Profile - TutorConnect</title>
    <link rel="stylesheet" href="tutor_profile.css" />
  </head>
  <body>
    <aside class="sidebar">
      <h2 class="logo">TutorConnect</h2>
      <nav>
        <a href="tutor_dashboard.html"> Dashboard</a>
        <a href="tutor_profile.html" class="active"> My Profile</a>
        <a href="tutor_sessions.html">Sessions</a>
        <!-- <a href="tutor_attendance.html">Session Attendance</a> -->
        <!-- <a href="notifications.html">Notifications</a> -->
        <a href="completed_sessions.html">Complete Session</a>
        <a href="tutor_progress.html">Progress</a>
        <a href="tutor_doubt_requests.html">Doubt Request</a>
        <a href="tutor_group.html">Groups</a>
        <a href="tutor_logout.html" class="logout"> Logout</a>
      </nav>
    </aside>

    <main class="content">
      <header>
        <h1>Complete Your Tutor Profile</h1>
        <p>
          Fill out your profile to get approved by admin and start teaching
          learners.
        </p>
      </header>

      <section class="profile-section">
        <form id="tutorProfileForm" enctype="multipart/form-data">
          <div class="form-group">
            <label for="bio">Bio</label>
            <textarea
              id="bio"
              name="bio"
              placeholder="Write about yourself..."
            ></textarea>
          </div>

          <div class="form-group">
            <label for="skills">Skills</label>
            <input
              type="text"
              id="skills"
              name="skills"
              placeholder="Java, Python, AI..."
            />
          </div>

          <div class="form-group">
            <label for="subjects">Subjects</label>
            <input
              type="text"
              id="subjects"
              name="subjects"
              placeholder="Subjects you teach"
            />
          </div>

          <div class="form-group">
            <label for="profile_pic">Profile Picture</label>
            <input
              type="file"
              id="profile_pic"
              name="profile_pic"
              accept="image/*"
            />
          </div>

          <div class="form-group">
            <label for="availability">Availability</label>
            <input
              type="text"
              id="availability"
              name="availability"
              placeholder="Mon-Fri 10am-4pm"
            />
          </div>

          <div class="form-group">
            <label for="certifications">Certifications</label>
            <input
              type="file"
              id="certifications"
              name="certifications"
              multiple
              accept=".pdf,image/*"
            />
          </div>

          <button type="submit" class="btn">Submit Profile</button>
          <p class="message" id="formMessage"></p>
        </form>
      </section>
    </main>

    <script>
      window.addEventListener("DOMContentLoaded", async () => {
        try {
          const res = await fetch("/api/tutor_status");
          const data = await res.json();

          if (data.status === "approved") {
            window.location.href = "tutor_sessions.html";
          } else if (data.status === "pending") {
            alert("Your profile is under review by the admin.");
          } else if (data.status === "rejected") {
            alert("Your profile was rejected. Please resubmit your details.");
          }
        } catch (err) {
          console.error("Error fetching tutor status:", err);
        }
      });

      const form = document.getElementById("tutorProfileForm");
      const messageEl = document.getElementById("formMessage");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const formData = new FormData(form);

        try {
          const res = await fetch("/api/tutors/profile", {
            method: "POST",
            body: formData,
          });

          const data = await res.json();
          if (res.ok) {
            messageEl.style.color = "green";
            messageEl.innerText = data.message;
            form.reset();
          } else {
            messageEl.style.color = "red";
            messageEl.innerText = data.error || "Something went wrong!";
          }
        } catch (err) {
          messageEl.style.color = "red";
          messageEl.innerText = "Server error. Try again later.";
          console.error(err);
        }
      });
    </script>
  </body>
</html>
